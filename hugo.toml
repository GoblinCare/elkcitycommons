baseURL = 'https://elkcitycommons.com/'
languageCode = 'en-us'
title = 'Elk City Commons'
theme = 'PaperMod'
publishDir = '.'
[pagination]
  pagerSize = 10
enableRobotsTXT = true

[params]
  description = "A community hub for Elk City, Oklahoma — local shops, events, and more."
  author = "Elk City Commons"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  disableThemeToggle = false
  defaultTheme = "dark"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:hello@elkcitycommons.com"

[menu]
  [[menu.main]]
    name = "Eat"
    url = "/eat/"
    weight = 10
  [[menu.main]]
    name = "Shop"
    url = "/shop/"
    weight = 20
  [[menu.main]]
    name = "Stay"
    url = "/stay/"
    weight = 30
  [[menu.main]]
    name = "Play"
    url = "/play/"
    weight = 40
  [[menu.main]]
    name = "Events"
    url = "/events/"
    weight = 50
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 60

[markup]
  [markup.goldmark.renderer]
    unsafe = true
